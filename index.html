<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Hábitos diarios</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1a14" id="meta-theme-color">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hábitos diarios">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  :root {
    --bg: #0f1a14; --surface: #17231c; --surface-2: #1f2d24; --border: #2b3a30;
    --text: #eef1ea; --text-muted: #8ea092; --accent: #e8b64a; --accent-dim: #4a3f22;
    --danger: #d9704f; --radius: 14px; --shadow: rgba(0,0,0,0.5);
  }

  body.light-theme {
    --bg: #f4f6f4; --surface: #ffffff; --surface-2: #e9ece9; --border: #d0d6d2;
    --text: #1a231e; --text-muted: #6b7870; --accent: #d89f2a; --accent-dim: #fcf0d4;
    --danger: #cc5631; --shadow: rgba(0,0,0,0.1);
  }

  *{box-sizing:border-box;} html,body{height:100%;}
  body{ margin:0; background:var(--bg); color:var(--text); font-family:'Work Sans',sans-serif; -webkit-tap-highlight-color:transparent; overscroll-behavior-y:contain; transition: background-color 0.3s, color 0.3s; }
  input, textarea { font-family: inherit; }

  #app{ max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; padding-bottom:110px; padding-top:env(safe-area-inset-top); }
  header{ padding: 26px 20px 6px; }
  .eyebrow{ font-family:'Space Mono', monospace; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted); }
  .header-row{ display:flex; align-items:center; justify-content:space-between; margin-top:4px; }
  .wordmark{ font-family:'Fraunces', serif; font-weight:600; font-size:22px; color:var(--text); display:flex; align-items:center; gap:8px; }
  .wordmark .link-icon{ color:var(--accent); }
  .header-actions { display: flex; gap: 4px; }
  .btn-icon{ background:transparent; border:none; color:var(--text-muted); cursor:pointer; display:flex; align-items:center; justify-content:center; padding:6px; border-radius: 8px; transition: color 0.2s; }
  .btn-icon:hover{ color:var(--accent); background: var(--surface-2); }

  .ring-wrap{ display:flex; flex-direction:column; align-items:center; padding: 18px 20px 8px; }
  .progress-ring { width: 152px; height: 152px; border-radius: 50%; background: conic-gradient(var(--accent) calc(var(--pct, 0) * 1%), var(--surface-2) 0); display:flex; align-items:center; justify-content:center; position:relative; transition: background 0.4s; }
  .progress-ring::before { content:''; position:absolute; inset:11px; background: var(--bg); border-radius:50%; transition: background 0.3s; }
  .progress-ring-inner { position:relative; z-index:1; text-align:center; }
  .progress-ring-value { font-family:'Fraunces',serif; font-size:36px; font-weight:600; color:var(--text); line-height:1; }
  .progress-ring-sep { color: var(--text-muted); font-weight:400; margin:0 2px; }
  .progress-ring-label { font-family:'Work Sans',sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-muted); margin-top:6px; }

  .empty-hero{ text-align:center; padding: 30px 24px 10px; color:var(--text-muted); }
  .empty-hero-icon{ font-size:38px; margin-bottom:10px; }
  .empty-hero h2{ font-family:'Fraunces',serif; font-weight:600; font-size:20px; color:var(--text); margin: 0 0 6px; }
  .empty-hero p{ font-size:13px; line-height:1.6; margin:0; }

  main{ flex:1; padding: 10px 20px 0; display:flex; flex-direction:column; gap:12px; }
  
  .category-header { font-family: 'Space Mono', monospace; font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin: 16px 0 2px 4px; letter-spacing: 0.05em; font-weight: 700;}

  /* Swipe-to-action: envoltorio que recorta y aloja los botones bajo la tarjeta */
  .habit-card-wrap{ position:relative; border-radius: var(--radius); overflow:hidden; transition: transform 0.22s ease, opacity 0.3s ease, height 0.3s ease, margin 0.3s ease; }
  .habit-card-wrap.collapsing { height: 0 !important; margin-top: 0 !important; margin-bottom: 0 !important; opacity: 0; pointer-events: none; }
  .habit-card-wrap.reorder-lifted{ transition:none; z-index:60; }
  .swipe-actions{ position:absolute; top:0; right:0; bottom:0; display:flex; align-items:stretch; }
  .swipe-action{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; width:74px; border:none; font-family:'Work Sans',sans-serif; font-size:10.5px; font-weight:600; color:#fff; cursor:pointer; letter-spacing:.01em; -webkit-tap-highlight-color:transparent; }
  .swipe-action .icon{ font-size:18px; line-height:1; }
  .swipe-action.archive{ background: #6b7c72; }
  .swipe-action.delete{ background: var(--danger); }
  body.light-theme .swipe-action.archive{ background:#8a988f; }

  .habit-card{ background: var(--surface); border:1px solid var(--border); border-radius: var(--radius); padding: 14px 14px 12px; position: relative; transition: transform 0.2s, box-shadow 0.2s, background-color 0.3s; touch-action: pan-y; will-change: transform; }
  .habit-card.swiping{ transition: none; }
  .habit-card.lifted{ transition: transform 0.15s ease, box-shadow 0.15s ease; transform: scale(1.035); box-shadow: 0 16px 34px var(--shadow); }
  .habit-top{ display:flex; align-items:center; gap:10px; }
  .habit-emoji{ font-size:22px; line-height:1; flex-shrink:0; }
  .habit-name-wrap{ flex:1; min-width:0; cursor:pointer; }
  .habit-name{ font-family:'Work Sans',sans-serif; font-weight:600; font-size:15px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .habit-streak{ font-family:'Space Mono',monospace; font-size:11px; color:var(--accent); margin-top:2px; display:flex; align-items:center; gap:4px; }
  .habit-streak.zero{ color: var(--text-muted); }
  .habit-actions{ display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .btn-more{ background:transparent; border:none; color:var(--text-muted); font-size:16px; cursor:pointer; padding:6px 4px; line-height:1; }
  .btn-more:hover{ color:var(--accent); }

  .check-today{ width:38px; height:38px; border-radius:50%; border:2px solid var(--border); background:var(--surface-2); color:transparent; display:flex; align-items:center; justify-content:center; cursor:pointer; transition: all .2s; flex-shrink:0; font-size:16px; overflow:hidden;}
  .check-today.done{ background:var(--accent); border-color:var(--accent); color:var(--bg); }
  .check-today.rest{ border-style: dashed; color:var(--text-muted); font-size:14px; background: transparent; }
  .check-today.progress{ color:var(--text); font-size:11px; font-family:'Space Mono', monospace; font-weight:700; line-height:1; }

  .chain-row{ display:flex; align-items:center; margin-top:12px; padding: 0 2px; pointer-events: none; }
  .chain-link{ display:flex; flex-direction:column; align-items:center; gap:4px; flex-shrink:0; }
  .chain-dot{ width:22px; height:22px; border-radius:50%; background:var(--surface-2); border:2px solid var(--border); transition: all .2s; pointer-events: auto; display:flex; align-items:center; justify-content:center; cursor: pointer; font-size: 10px; }
  .chain-dot.done{ background:var(--accent); border-color:var(--accent); box-shadow: 0 0 8px rgba(232,182,74,.45); }
  .chain-dot.skip{ background:transparent; border-style:dashed; border-color:var(--text-muted); color:var(--text-muted); }
  .chain-dot.rest{ opacity:0.4; border-style:dashed; cursor:default; }
  .chain-dot.today{ box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--text-muted); }
  .chain-dot.today.done{ box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--accent); }
  .chain-connector{ flex:1; height:2px; background:var(--border); margin: 0 -1px; position:relative; top:-13px; }
  .chain-connector.lit{ background: var(--accent); }
  .chain-connector.skip{ background: var(--text-muted); opacity: 0.5; border-top: 1px dashed var(--bg); }
  .chain-day-label{ font-family:'Space Mono',monospace; font-size:9px; color:var(--text-muted); }

  .fab{ position:fixed; bottom:26px; left:50%; transform:translateX(-50%); background:var(--accent); color:var(--bg); border:none; border-radius:999px; padding: 14px 24px; display:flex; align-items:center; gap:8px; font-family:'Work Sans',sans-serif; font-weight:600; font-size:14px; box-shadow: 0 10px 30px var(--shadow); cursor:pointer; z-index:40; transition: background-color 0.3s; }
  .fab svg{ width:18px; height:18px; }

  /* ---------- Modales ---------- */
  .modal-overlay { position: fixed; inset:0; background: rgba(0,0,0,0.6); display: none; align-items: flex-end; justify-content: center; z-index: 100; backdrop-filter: blur(2px); }
  .modal-overlay.active { display: flex; }
  .modal-content { background: var(--surface); border:1px solid var(--border); border-top-left-radius:20px; border-top-right-radius:20px; padding: 22px 20px calc(20px + env(safe-area-inset-bottom)); width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; transition: background-color 0.3s; }
  @media (min-width:560px){ .modal-overlay{ align-items:center; } .modal-content{ border-radius:var(--radius); max-height:85vh; } }
  .modal-title { font-family: 'Fraunces', serif; font-weight:600; font-size:19px; margin: 0 0 18px; color: var(--text); }
  .field-label{ font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); margin-bottom:8px; display:block; }
  .field-input{ width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:12px 14px; color:var(--text); font-size:15px; outline:none; margin-bottom:18px; box-sizing: border-box;}
  .field-input:focus{ border-color:var(--accent); }
  .field-input.field-error{ border-color: var(--danger); animation: field-shake 0.4s; }
  @keyframes field-shake { 10%,90%{transform:translateX(-1px);} 20%,80%{transform:translateX(2px);} 30%,50%,70%{transform:translateX(-4px);} 40%,60%{transform:translateX(4px);} }
  .input-group { display: flex; gap: 10px; }
  .input-group > * { flex: 1; }

  .emoji-search{ margin-bottom:10px; }
  .emoji-cat-tabs{ display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; margin-bottom:10px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .emoji-cat-tabs::-webkit-scrollbar{ display:none; }
  .emoji-cat-tab{ flex-shrink:0; padding:6px 13px; border-radius:999px; background:var(--surface-2); border:1px solid var(--border); color:var(--text-muted); font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; transition:.2s; }
  .emoji-cat-tab.active{ background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }
  .emoji-grid{ display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin-bottom:20px; max-height:186px; overflow-y:auto; padding-right:2px; }
  .emoji-opt{ aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:20px; background:var(--surface-2); border:2px solid transparent; border-radius:10px; cursor:pointer; }
  .emoji-opt.selected{ border-color:var(--accent); background: var(--accent-dim); }
  .emoji-empty{ grid-column:1/-1; text-align:center; color:var(--text-muted); font-size:13px; padding:18px 0; }

  .freq-grid { display: flex; gap: 6px; margin-bottom: 20px; }
  .freq-day { flex: 1; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: var(--surface-2); border: 2px solid transparent; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-muted); transition: 0.2s; }
  .freq-day.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }

  .status-group { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .status-btn { flex: 1; min-width: 80px; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--surface-2); color: var(--text-muted); text-align: center; transition: 0.2s; }
  .status-btn.active.done { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .status-btn.active.skip { background: transparent; border: 2px dashed var(--text-muted); color: var(--text); }
  .status-btn.active.none { border-color: var(--text); color: var(--text); }

  .modal-actions { display: flex; gap: 10px; margin-top: 4px; }
  .btn{ flex:1; border-radius:10px; padding:13px; font-family:'Work Sans',sans-serif; font-weight:600; font-size:14px; cursor:pointer; border:1px solid var(--border); background:var(--surface-2); color:var(--text); display:flex; justify-content:center; align-items:center; gap:8px;}
  .btn-accent{ background:var(--accent); color:var(--bg); border-color:var(--accent); }
  .btn-danger{ background:var(--surface-2); color:var(--danger); border-color:var(--border); flex:none; width: 48px; }

  .detail-stats{ display:flex; gap:10px; margin-bottom:18px; }
  .stat-box{ flex:1; background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:12px 10px; text-align:center; }
  .stat-value{ font-family:'Fraunces',serif; font-weight:600; font-size:20px; color:var(--accent); }
  .stat-label{ font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; margin-top:2px; }

  .cal-nav{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .cal-nav-title{ font-family:'Work Sans',sans-serif; font-weight:600; font-size:13px; text-transform:uppercase; letter-spacing:.04em; }
  .calendar-grid { display:grid; grid-template-columns:repeat(7, 1fr); gap:6px; }
  .cal-day-label{ text-align:center; font-size:10px; color:var(--text-muted); font-weight:600; }
  .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: var(--surface-2); border: 1px solid var(--border); position: relative; border-radius: 8px; font-size: 12px; color: var(--text); cursor: pointer; transition: 0.2s; }
  .cal-day:hover { border-color: var(--accent); }
  .cal-day.today{ border-color:var(--text-muted); }
  .cal-day.done{ background:var(--accent); color:var(--bg); border-color:var(--accent); font-weight:700; }
  .cal-day.skip{ background:transparent; border: 2px dashed var(--text-muted); color:var(--text-muted); }
  .cal-day.rest{ opacity: 0.4; border-style: dashed; }
  .cal-day.selected { outline: 2px solid var(--accent); outline-offset: 2px; }
  .cal-day.has-note::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; }
  .cal-day.done.has-note::after { background: var(--bg); }

  .menu-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px; background: var(--surface-2); border: 1px solid var(--border); padding: 14px 16px; border-radius: 10px; color: var(--text); font-family: inherit; font-size: 15px; font-weight: 500; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
  .menu-btn:hover { border-color: var(--accent); }
  .menu-btn.danger { color: var(--danger); border-color: rgba(217, 112, 79, 0.3); }

  .note-section { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 18px; display: none; }
  .note-section.active { display: block; }
  .note-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  
  .toast{ position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(12px); background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 10px 10px 10px 16px; display: flex; align-items: center; gap: 10px; box-shadow: 0 8px 24px var(--shadow); z-index: 120; font-size:13px; opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; max-width: calc(100% - 40px); }
  .toast.active{ opacity:1; pointer-events:auto; transform: translateX(-50%) translateY(0); }
  .toast-action{ background: var(--accent-dim); border:none; color: var(--accent); font-weight:700; font-size:12.5px; cursor:pointer; padding:7px 12px; border-radius:8px; flex-shrink:0; }

  #timer-modal .modal-content { text-align: center; max-width: 380px; }
  .timer-display { font-family: 'Space Mono', monospace; font-size: 64px; font-weight: 700; color: var(--accent); margin: 30px 0; font-variant-numeric: tabular-nums; }
  .timer-controls { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
  .btn-circle { width: 64px; height: 64px; border-radius: 50%; border: none; background: var(--surface-2); color: var(--text); font-size: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 12px var(--shadow); }
  .btn-circle:hover { transform: scale(1.05); }
  .btn-circle.play { background: var(--accent); color: var(--bg); }
  .btn-circle.danger { background: var(--danger); color: #fff; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="eyebrow" id="today-eyebrow"></div>
    <div class="header-row">
      <div class="wordmark">
        <svg class="link-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M8 12a4 4 0 0 1 4-4h2a4 4 0 0 1 0 8h-1"/><path d="M16 12a4 4 0 0 1-4 4H10a4 4 0 0 1 0-8h1"/></svg>
        Hábitos diarios
      </div>
      <div class="header-actions">
        <button class="btn-icon" title="Cambiar tema" onclick="toggleTheme()">
          <svg id="theme-icon" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
        </button>
        <button class="btn-icon" title="Opciones" onclick="openSettingsModal()">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
      </div>
    </div>
  </header>

  <div id="ring-area"></div>
  <main id="habit-list"></main>
</div>

<button class="fab" onclick="openHabitModal()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  Nuevo hábito
</button>

<div class="modal-overlay" id="habit-modal">
  <div class="modal-content">
    <h2 class="modal-title" id="habit-modal-title">Nuevo hábito</h2>
    
    <label class="field-label">Nombre</label>
    <input type="text" id="habit-name-input" class="field-input" placeholder="Ej. Beber agua, Meditar..." maxlength="40">
    
    <label class="field-label">Icono</label>
    <input type="text" id="emoji-search" class="field-input emoji-search" placeholder="Buscar icono (ej. agua, correr, leer)...">
    <div class="emoji-cat-tabs" id="emoji-cat-tabs"></div>
    <div class="emoji-grid" id="emoji-grid"></div>

    <label class="field-label">Días de la semana</label>
    <div class="freq-grid" id="freq-grid">
      <div class="freq-day" data-day="1">L</div><div class="freq-day" data-day="2">M</div><div class="freq-day" data-day="3">X</div>
      <div class="freq-day" data-day="4">J</div><div class="freq-day" data-day="5">V</div><div class="freq-day" data-day="6">S</div><div class="freq-day" data-day="0">D</div>
    </div>

    <label class="field-label">Momento del día</label>
    <div class="status-group" id="tod-group" style="margin-bottom:20px;">
      <button class="status-btn active" id="tod-morning" onclick="selectTimeOfDay('morning')" style="border-color:var(--accent); color:var(--text);">Mañana</button>
      <button class="status-btn none" id="tod-afternoon" onclick="selectTimeOfDay('afternoon')">Tarde</button>
      <button class="status-btn none" id="tod-evening" onclick="selectTimeOfDay('evening')">Noche</button>
      <button class="status-btn none" id="tod-any" onclick="selectTimeOfDay('any')">Cualquiera</button>
    </div>

    <label class="field-label">Tipo de medición</label>

let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
  } catch (err) { console.log('Wake Lock denegado:', err); }
}
function releaseWakeLock() {

// --- 3. Configuración del Web Worker en línea ---
const workerCode = `
  let int; 
  self.onmessage = e => { 
    if(e.data === 'start') int = setInterval(() => postMessage('tick'), 200); 
    else clearInterval(int); 
  }
`;
const timerWorker = new Worker(URL.createObjectURL(new Blob([workerCode], {type: 'application/javascript'})));

timerWorker.onmessage = () => {
  if (!isTimerRunning) return;
  const now = Date.now();
  const delta = Math.floor((now - lastTimerTick) / 1000);
  if (delta > 0) {
    timerSecondsLeft -= delta;
    lastTimerTick = now;
    if (timerSecondsLeft <= 0) {
      timerSecondsLeft = 0; updateTimerDisplay(); completeTimerEarly();
    } else {
      updateTimerDisplay();
    }
  }
};

function uid(){ return Math.random().toString(36).slice(2,9); }
function getLocalDateStr(date) { const d = new Date(date.getTime() - date.getTimezoneOffset() * 60000); return d.toISOString().split('T')[0]; }
function addDays(dateStr, n) { const d = new Date(dateStr + 'T00:00:00'); d.setDate(d.getDate() + n); return getLocalDateStr(d); }

      if (!h.type) h.type = 'boolean'; 
      if (!h.timeOfDay) h.timeOfDay = 'any'; 
      if (typeof h.archived === 'undefined') h.archived = false; 
      
      Object.keys(h.completions).forEach(date => {
        if (h.completions[date] === true) h.completions[date] = 'done';
      });
    });
  } catch (e) { state = defaultState(); }
  saveState(); render();
  setTimeout(maybeShowSwipeHint, 50);
}

function isHabitDone(habit, val) {
  if (val === 'done') return true;
  if (habit.type === 'numeric' && typeof val === 'number' && val >= habit.target) return true;
  return false;
}

// ==== CÁLCULOS ====
function getStreak(habit) {
  let streak = 0; let cursor = getLocalDateStr(new Date()); const todayStr = cursor;
  while (cursor >= habit.createdAt) {
    const val = habit.completions[cursor]; const dow = new Date(cursor + 'T00:00:00').getDay(); const isRequired = habit.frequency.includes(dow);
    if (isHabitDone(habit, val)) { streak++; } else if (val === 'skip' || !isRequired) { } else { if (cursor !== todayStr) break; }
    cursor = addDays(cursor, -1);
  }
  return streak;
}
function getBestStreak(habit) {
  let best = 0; let current = 0; let cursor = habit.createdAt; const todayStr = getLocalDateStr(new Date());
  while (cursor <= todayStr) {
    const val = habit.completions[cursor]; const dow = new Date(cursor + 'T00:00:00').getDay(); const isRequired = habit.frequency.includes(dow);
    if (isHabitDone(habit, val)) { current++; if (current > best) best = current; } else if (val === 'skip' || !isRequired) {} else { current = 0; }
    cursor = addDays(cursor, 1);
  }
  return best;
}
function getCompletionRate(habit) {
  let validDaysCount = 0; let doneDaysCount = 0; let cursor = habit.createdAt; const todayStr = getLocalDateStr(new Date());
  while (cursor <= todayStr) {
    const val = habit.completions[cursor]; const dow = new Date(cursor + 'T00:00:00').getDay(); const isRequired = habit.frequency.includes(dow);
    if (isRequired && val !== 'skip') { validDaysCount++; if (isHabitDone(habit, val)) doneDaysCount++; }
    cursor = addDays(cursor, 1);
  }
  return validDaysCount === 0 ? 0 : Math.round((doneDaysCount / validDaysCount) * 100);
}
function checkAllDoneToday() {
  const activeHabits = state.habits.filter(h => !h.archived);
  if (activeHabits.length === 0) return;
  const todayStr = getLocalDateStr(new Date()); const todayDow = new Date().getDay();
  const requiredHabits = activeHabits.filter(h => h.frequency.includes(todayDow));
  if (requiredHabits.length === 0) return;

  const allDone = requiredHabits.every(h => isHabitDone(h, h.completions[todayStr]) || h.completions[todayStr] === 'skip');
  if (allDone && typeof confetti === 'function') { confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#e8b64a', '#d9704f', '#8ea092', '#ffffff'] }); }
}

function renderRing() {
  const ringArea = document.getElementById('ring-area');
  const activeHabits = state.habits.filter(h => !h.archived);
  
  if (activeHabits.length === 0) { 
    if(state.habits.length > 0) {
      ringArea.innerHTML = `<div class="empty-hero" style="padding: 10px 24px 0;"><p>No tienes hábitos activos ahora mismo.</p></div>`;

// ==== GESTOS TÁCTILES NATIVOS ====
let openSwipeWrap = null;  
let reorderState = null;   
const LONG_PRESS_MS = 420;
const MOVE_DECIDE_PX = 8;

function closeOpenSwipe() {
  if (openSwipeWrap) {
    const openCard = openSwipeWrap.querySelector('.habit-card');
    if (openCard) openCard.style.transform = 'translateX(0)';
    openSwipeWrap.classList.remove('swipe-open');
    openSwipeWrap = null;
  }
}

function attachCardGestures(card, wrap, swipeActionsEl, habitId) {
  let startX = 0, startY = 0, currentX = 0, mode = null, longPressTimer = null, suppressClick = false;
  const actionsWidth = () => swipeActionsEl.offsetWidth || 148;
  const OPEN_THRESHOLD = 0.35;
  const cancelLongPress = () => { clearTimeout(longPressTimer); longPressTimer = null; };

  card.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    closeOpenSwipe();
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY; currentX = 0; mode = null;
    longPressTimer = setTimeout(() => {
      if (mode === null) { mode = 'reorder'; startReorder(wrap, card, t.clientY); }
    }, LONG_PRESS_MS);
  }, { passive: true });

  card.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    const dx = t.clientX - startX; const dy = t.clientY - startY;

    if (mode === 'reorder') { e.preventDefault(); updateReorder(t.clientY); return; }
    if (mode === 'swipe') {
      e.preventDefault();
      const wasOpen = wrap.classList.contains('swipe-open');
      const base = wasOpen ? -actionsWidth() : 0;
      currentX = Math.max(-actionsWidth() - 12, Math.min(0, base + dx));
      card.style.transform = `translateX(${currentX}px)`;
      return;
    }
    if (mode === 'scroll') return; 

    if (Math.abs(dx) > MOVE_DECIDE_PX || Math.abs(dy) > MOVE_DECIDE_PX) {
      cancelLongPress();
      mode = Math.abs(dx) > Math.abs(dy) ? 'swipe' : 'scroll';
      if (mode === 'swipe') card.classList.add('swiping');
    }
  }, { passive: false });

  const endGesture = () => {
    cancelLongPress();
    if (mode === 'reorder') {
      endReorder();
    } else if (mode === 'swipe') {
      card.classList.remove('swiping');
      const width = actionsWidth();
      if (currentX < -width * OPEN_THRESHOLD) {
        card.style.transform = `translateX(-${width}px)`;
        wrap.classList.add('swipe-open'); openSwipeWrap = wrap;
        if (navigator.vibrate) navigator.vibrate(8);
      } else {
        card.style.transform = 'translateX(0)';
      }
      if (Math.abs(currentX) > 10) { suppressClick = true; setTimeout(() => suppressClick = false, 250); }
    }
    mode = null;
  };
  card.addEventListener('touchend', endGesture);
  card.addEventListener('touchcancel', endGesture);

  card.addEventListener('click', (e) => { if (suppressClick) { e.stopPropagation(); e.preventDefault(); } }, true);
}

// ==== ANIMACIONES DE ELIMINACIÓN/ARCHIVO ====
function animateRemoval(habitId, callback) {
  const cardElement = document.querySelector(`.habit-card[data-id="${habitId}"]`);
  if (!cardElement) { callback(); return; }
  
  const cardWrap = cardElement.closest('.habit-card-wrap');
  if (cardWrap) {
    cardWrap.style.height = cardWrap.offsetHeight + 'px'; 
    void cardWrap.offsetHeight; 
    cardWrap.classList.add('collapsing');
    setTimeout(callback, 280); 
  } else {
    callback();
  }
}

function swipeToggleArchive(habitId) {
  closeOpenSwipe();
  animateRemoval(habitId, () => {
    const habit = state.habits.find(h => h.id === habitId); if (!habit) return;
    habit.archived = !habit.archived;
    saveState(); render();
    showToast(habit.archived ? 'Hábito archivado' : 'Hábito restaurado');
  });
}

function swipeDeleteHabit(habitId) {
  closeOpenSwipe();

}

const SWIPE_HINT_KEY = 'cadena-swipe-hint-v1';
function maybeShowSwipeHint() {
  try {
    if (localStorage.getItem(SWIPE_HINT_KEY)) return;
    if (showingArchived) return;
    const firstWrap = document.querySelector('#habit-list .habit-card-wrap');
    if (!firstWrap) return;
    const card = firstWrap.querySelector('.habit-card');
    if (!card) return;
    localStorage.setItem(SWIPE_HINT_KEY, '1');

    let cancelled = false;
    card.addEventListener('touchstart', () => { cancelled = true; card.style.transition = ''; card.style.transform = 'translateX(0)'; }, { once: true, passive: true });

    setTimeout(() => {
      if (cancelled) return;
      card.style.transition = 'transform 0.5s cubic-bezier(.22,1,.36,1)';
      card.style.transform = 'translateX(-48px)';
      setTimeout(() => {
        if (cancelled) return;
        card.style.transform = 'translateX(0)';
        setTimeout(() => { if (!cancelled) card.style.transition = ''; }, 500);
      }, 620);
    }, 750);
  } catch (e) {}
}

function startReorder(wrap, card, clientY) {
  const listEl = document.getElementById('habit-list');
  const wraps = [...listEl.querySelectorAll('.habit-card-wrap')];
  const originalIndex = wraps.indexOf(wrap);
  if (originalIndex === -1) return;
  const rect = wrap.getBoundingClientRect();
  const gap = 12; 
  reorderState = { wraps, originalIndex, currentIndex: originalIndex, itemHeight: rect.height + gap, startClientY: clientY, wrap, card };
  card.style.transform = '';
  wrap.style.overflow = 'visible'; 
  wrap.classList.add('reorder-lifted');
  card.classList.add('lifted');
  wrap.style.zIndex = '60';
  if (navigator.vibrate) navigator.vibrate(12);
}

function updateReorder(clientY) {
  if (!reorderState) return;
  const rs = reorderState;
  const dy = clientY - rs.startClientY;
  rs.wrap.style.transform = `translateY(${dy}px)`;

  let idx = rs.originalIndex + Math.round(dy / rs.itemHeight);
  idx = Math.max(0, Math.min(rs.wraps.length - 1, idx));
  if (idx !== rs.currentIndex) {
    rs.wraps.forEach((w, i) => {
      if (w === rs.wrap) return;
      let shift = 0;
      if (idx > rs.originalIndex) { if (i > rs.originalIndex && i <= idx) shift = -1; }
      else if (idx < rs.originalIndex) { if (i >= idx && i < rs.originalIndex) shift = 1; }
      w.style.transform = shift !== 0 ? `translateY(${shift * rs.itemHeight}px)` : '';
    });
    rs.currentIndex = idx;
  }
}

function endReorder() {
  if (!reorderState) return;
  const rs = reorderState;
  const finalIndex = rs.currentIndex;

  rs.wraps.forEach(w => { w.style.transform = ''; });
  rs.wrap.classList.remove('reorder-lifted'); rs.card.classList.remove('lifted');
  rs.wrap.style.zIndex = ''; rs.wrap.style.overflow = '';

  if (finalIndex !== rs.originalIndex) {
    const newOrderIds = rs.wraps.map(w => w.dataset.id);
    const [movedId] = newOrderIds.splice(rs.originalIndex, 1);
    newOrderIds.splice(finalIndex, 0, movedId);

    const habit = state.habits.find(h => h.id === movedId);
    const neighborId = newOrderIds[finalIndex - 1] || newOrderIds[finalIndex + 1];
    if (habit && neighborId) {
      const neighborHabit = state.habits.find(h => h.id === neighborId);
      if (neighborHabit) habit.timeOfDay = neighborHabit.timeOfDay;
    }

    const archived = state.habits.filter(h => h.archived);
    const activeMap = new Map(state.habits.filter(h => !h.archived).map(h => [h.id, h]));
    const reorderedActive = newOrderIds.map(id => activeMap.get(id)).filter(Boolean);
    state.habits = [...reorderedActive, ...archived];

    saveState();
    if (navigator.vibrate) navigator.vibrate(6);
  }
  render();
  reorderState = null;
}

function renderChain(habit, todayStr) {
  const days = []; for (let i = CHAIN_DAYS - 1; i >= 0; i--) days.push(addDays(todayStr, -i));
  const wrap = document.createElement('div'); wrap.className = 'chain-row';
  const dayNames = ['D','L','M','X','J','V','S'];

  days.forEach((ds, idx) => {
    const val = habit.completions[ds];
    const isToday = ds === todayStr; const isFuture = ds > todayStr;
    const dow = new Date(ds + 'T00:00:00').getDay();
    const isRequired = habit.frequency.includes(dow);

    const link = document.createElement('div'); link.className = 'chain-link';
    const dot = document.createElement('div');
    
    let dotClass = 'chain-dot'; let dotContent = '';
    
    if (isHabitDone(habit, val)) { dotClass += ' done'; }
    else if (val === 'skip') { dotClass += ' skip'; dotContent = '⏸'; }
    else if (!isRequired && !isFuture) { dotClass += ' rest'; }
    else if (habit.type === 'numeric' && typeof val === 'number' && val > 0) { dot.style.background = 'var(--surface-2)'; dot.style.border = '2px solid var(--accent)'; dot.style.color = 'var(--accent)'; }
    
    if (isToday) dotClass += ' today';
    dot.className = dotClass; dot.innerHTML = dotContent;
    
    if (!isFuture) dot.onclick = () => handleActionClick(habit.id, ds); else dot.style.opacity = '0.35';
    
    const label = document.createElement('div'); label.className = 'chain-day-label'; label.textContent = dayNames[dow];
    link.append(dot, label); wrap.appendChild(link);

    if (idx < days.length - 1) {
      const connector = document.createElement('div');
      const nextVal = habit.completions[days[idx + 1]];
      if (isHabitDone(habit, val) && isHabitDone(habit, nextVal)) connector.className = 'chain-connector lit';
      else if (val === 'skip' || nextVal === 'skip') connector.className = 'chain-connector skip';
      else connector.className = 'chain-connector';
      wrap.appendChild(connector);
    }
  });
  return wrap;
}

function handleActionClick(habitId, dateStr) {
  const habit = state.habits.find(h => h.id === habitId); if (!habit) return;
  const todayStr = getLocalDateStr(new Date()); if (dateStr > todayStr) return;
  
  const currentVal = habit.completions[dateStr];
  const dow = new Date(dateStr + 'T00:00:00').getDay(); const isRequired = habit.frequency.includes(dow);
  const isModifyingPast = dateStr < todayStr;
  const isTryingToCompleteRestDay = !isHabitDone(habit, currentVal) && !isRequired;

  activeActionHabitId = habitId; activeActionDateStr = dateStr;

  const executeSpecificAction = () => {
    if (habit.type === 'numeric') {
      if (currentVal === 'done') toggleCompletionDirect(habitId, dateStr); 
      else openNumericModal(habit);
    } else if (habit.type === 'timer') {
      if (isModifyingPast) { showConfirm('No puedes usar el temporizador para días pasados. ¿Quieres marcarlo como completado manualmente?', () => { toggleCompletionDirect(habitId, dateStr); }, {title: 'Marcar Manualmente', okLabel: 'Completar', danger: false}); } 
      else { if (currentVal === 'done') toggleCompletionDirect(habitId, dateStr); else openTimerModal(habit); }
    } else { toggleCompletionDirect(habitId, dateStr); }
  };

  const checkRestDayAndToggle = () => { if (isTryingToCompleteRestDay) { setTimeout(() => { showConfirm('¿Estás seguro de marcar/añadir progreso a un día de descanso?', executeSpecificAction, {title: 'Día Libre', okLabel: 'Continuar', danger: false}); }, 150); } else { executeSpecificAction(); } };
  if (isModifyingPast) { showConfirm('¿Seguro que quieres modificar un día anterior del historial?', checkRestDayAndToggle, {title: 'Modificar Historial', okLabel: 'Modificar', danger: false}); } else { checkRestDayAndToggle(); }
}

function toggleCompletionDirect(habitId, dateStr) {
  const habit = state.habits.find(h => h.id === habitId); const currentVal = habit.completions[dateStr];
  let newlyChecked = false;
  if (isHabitDone(habit, currentVal)) { delete habit.completions[dateStr]; } else { habit.completions[dateStr] = 'done'; newlyChecked = true; }
  saveState(); render();
  if (newlyChecked && dateStr === getLocalDateStr(new Date())) checkAllDoneToday();
  refreshDetailCalendar(habitId, dateStr);
}

function refreshDetailCalendar(habitId, dateStr) {
  if (document.getElementById('detail-modal').classList.contains('active') && detailHabitId === habitId) {
      renderDetailModal(); const habit = state.habits.find(h => h.id === habitId);
      if (selectedNoteDate === dateStr) updateStatusButtons(isHabitDone(habit, habit.completions[dateStr]) ? 'done' : habit.completions[dateStr]);
  }
}

function openNumericModal(habit) {
  const currentVal = typeof habit.completions[activeActionDateStr] === 'number' ? habit.completions[activeActionDateStr] : 0;
  document.getElementById('numeric-title').textContent = habit.name; document.getElementById('numeric-target-label').textContent = `${habit.target} ${habit.unit || ''}`;
  document.getElementById('numeric-current-input').value = currentVal || ''; document.getElementById('numeric-modal').classList.add('active'); setTimeout(() => document.getElementById('numeric-current-input').focus(), 50);
}
function closeNumericModal() { document.getElementById('numeric-modal').classList.remove('active'); }
function adjustNumericProgress(amount) { const input = document.getElementById('numeric-current-input'); let val = parseFloat(input.value) || 0; val = Math.max(0, val + amount); input.value = val; }
function saveNumericProgress() {
  const habit = state.habits.find(h => h.id === activeActionHabitId); let val = parseFloat(document.getElementById('numeric-current-input').value);
  if (isNaN(val) || val <= 0) { delete habit.completions[activeActionDateStr]; } else { habit.completions[activeActionDateStr] = val; }
  saveState(); render(); closeNumericModal();
  if (isHabitDone(habit, val) && activeActionDateStr === getLocalDateStr(new Date())) checkAllDoneToday();
  refreshDetailCalendar(habit.id, activeActionDateStr);
}

// ==== CONTROLES DEL TEMPORIZADOR ACTUALIZADOS ====
function openTimerModal(habit) {
  timerTotalSeconds = habit.duration * 60; timerSecondsLeft = timerTotalSeconds; isTimerRunning = false;
  document.getElementById('timer-title').textContent = habit.name; updateTimerDisplay();
  const playBtn = document.getElementById('timer-btn-play'); playBtn.innerHTML = '▶'; playBtn.classList.remove('danger'); playBtn.classList.add('play');
  document.getElementById('timer-modal').classList.add('active');
}

function closeTimerModal() { 
  stopTimerInterval(); 
  document.getElementById('timer-modal').classList.remove('active'); 
}

function updateTimerDisplay() { 
  const m = Math.floor(timerSecondsLeft / 60).toString().padStart(2, '0'); 
  const s = (timerSecondsLeft % 60).toString().padStart(2, '0'); 
  document.getElementById('timer-display').textContent = `${m}:${s}`; 
}

function toggleTimerPlay() {
  const playBtn = document.getElementById('timer-btn-play');
  if (isTimerRunning) { 
    stopTimerInterval(); 
    isTimerRunning = false; 
    playBtn.innerHTML = '▶'; 
  } else {
    isTimerRunning = true; 
    lastTimerTick = Date.now(); 
    playBtn.innerHTML = '⏸';
    requestWakeLock(); 
    timerWorker.postMessage('start'); 
  }
}

function stopTimerInterval() { 
  timerWorker.postMessage('stop'); 
  releaseWakeLock(); 
}

function stopTimer() { 
  stopTimerInterval(); 
  isTimerRunning = false; 
  timerSecondsLeft = timerTotalSeconds; 
  document.getElementById('timer-btn-play').innerHTML = '▶'; 
  updateTimerDisplay(); 
}

function completeTimerEarly() {
  closeTimerModal(); 
  const habit = state.habits.find(h => h.id === activeActionHabitId); 
  habit.completions[activeActionDateStr] = 'done';
  saveState(); render(); 
  if (activeActionDateStr === getLocalDateStr(new Date())) checkAllDoneToday(); 
  refreshDetailCalendar(habit.id, activeActionDateStr);
}

function buildEmojiGrid() {
  const grid = document.getElementById('emoji-grid'); grid.innerHTML = '';
  const term = emojiSearchTerm.trim().toLowerCase();
  let pool = [];
  if (term) {
    EMOJI_CATEGORIES.forEach(cat => pool.push(...cat.items));
    pool = pool.filter(it => it.e === term || it.tags.some(tag => tag.includes(term)));
  } else {
    EMOJI_CATEGORIES.forEach(cat => { if (activeEmojiCat === 'all' || activeEmojiCat === cat.id) pool.push(...cat.items); });
  }
  if (pool.length === 0) { grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:var(--text-muted); font-size:13px; padding:16px 0;">Sin resultados</div>`; return; }
  pool.forEach(it => {
    const opt = document.createElement('div'); opt.className = 'emoji-opt' + (it.e === selectedEmoji ? ' selected' : ''); opt.textContent = it.e;
    opt.onclick = () => { selectedEmoji = it.e; buildEmojiGrid(); };
    grid.appendChild(opt);
  });
}
function bindFreqEvents() { document.querySelectorAll('.freq-day').forEach(el => { el.onclick = () => { const day = parseInt(el.dataset.day); if (selectedFreq.includes(day)) { if (selectedFreq.length > 1) selectedFreq = selectedFreq.filter(d => d !== day); } else { selectedFreq.push(day); } updateFreqUI(); }; }); }
function updateFreqUI() { document.querySelectorAll('.freq-day').forEach(el => { if (selectedFreq.includes(parseInt(el.dataset.day))) el.classList.add('selected'); else el.classList.remove('selected'); }); }

function selectHabitType(type) {
  selectedType = type;
  ['boolean', 'numeric', 'timer'].forEach(t => {
      const btn = document.getElementById(`type-${t}`);
      btn.classList.remove('active'); btn.classList.add('none'); btn.style.borderColor = 'var(--border)'; btn.style.color = 'var(--text-muted)';
  });
  const activeBtn = document.getElementById(`type-${type}`);
  activeBtn.classList.add('active'); activeBtn.classList.remove('none'); activeBtn.style.borderColor = 'var(--accent)'; activeBtn.style.color = 'var(--text)';
  document.getElementById('fields-numeric').style.display = type === 'numeric' ? 'block' : 'none'; document.getElementById('fields-timer').style.display = type === 'timer' ? 'block' : 'none';
}

function selectTimeOfDay(tod) {
  selectedTimeOfDay = tod;
  ['morning', 'afternoon', 'evening', 'any'].forEach(t => {
      const btn = document.getElementById(`tod-${t}`);
      if(btn) { btn.classList.remove('active'); btn.classList.add('none'); btn.style.borderColor = 'var(--border)'; btn.style.color = 'var(--text-muted)'; }
  });
  const activeBtn = document.getElementById(`tod-${tod}`);
  if(activeBtn) { activeBtn.classList.add('active'); activeBtn.classList.remove('none'); activeBtn.style.borderColor = 'var(--accent)'; activeBtn.style.color = 'var(--text)'; }
}

function openHabitModal(habitId = null) {
  editingHabitId = habitId;
  const habit = habitId ? state.habits.find(h => h.id === habitId) : null;
  document.getElementById('habit-modal-title').textContent = habit ? 'Editar hábito' : 'Nuevo hábito';
  document.getElementById('habit-name-input').value = habit ? habit.name : '';
  
  document.getElementById('habit-delete-btn').style.display = habit ? 'block' : 'none';
  document.getElementById('habit-archive-btn').style.display = habit ? 'block' : 'none';
  
  if (habit) {
    document.getElementById('habit-archive-btn').innerHTML = habit.archived ? '📤' : '📦';
    document.getElementById('habit-archive-btn').title = habit.archived ? 'Desarchivar' : 'Archivar';
  }
  
  selectedEmoji = habit ? habit.emoji : EMOJI_CATEGORIES[0].items[0].e;
  selectedFreq = habit ? [...habit.frequency] : [0,1,2,3,4,5,6];
  
  document.getElementById('habit-target').value = habit && habit.type === 'numeric' ? habit.target : '';
  document.getElementById('habit-unit').value = habit && habit.type === 'numeric' ? (habit.unit || '') : '';
  document.getElementById('habit-duration').value = habit && habit.type === 'timer' ? habit.duration : '';
  
  selectHabitType(habit ? habit.type : 'boolean');
  selectTimeOfDay(habit && habit.timeOfDay ? habit.timeOfDay : 'any');
  
  emojiSearchTerm = ''; document.getElementById('emoji-search').value = ''; activeEmojiCat = 'all';
  buildEmojiCatTabs(); buildEmojiGrid(); bindFreqEvents(); updateFreqUI();
  document.getElementById('habit-modal').classList.add('active');
  setTimeout(() => document.getElementById('habit-name-input').focus(), 50);
}

function closeHabitModal() { document.getElementById('habit-modal').classList.remove('active'); editingHabitId = null; }

function saveHabitFromModal() {
  const name = document.getElementById('habit-name-input').value.trim(); if (!name) { flagInvalidField('habit-name-input', 'Ponle un nombre a tu hábito.'); return; }
  
  let target = null, unit = null, duration = null;
  if (selectedType === 'numeric') {
    target = parseFloat(document.getElementById('habit-target').value); if (!target || target <= 0) { flagInvalidField('habit-target', 'Introduce un objetivo numérico válido.'); return; }
    unit = document.getElementById('habit-unit').value.trim();
  } else if (selectedType === 'timer') {
    duration = parseInt(document.getElementById('habit-duration').value); if (!duration || duration <= 0) { flagInvalidField('habit-duration', 'Introduce un tiempo válido en minutos.'); return; }
  }
  
  if (editingHabitId) {
    const habit = state.habits.find(h => h.id === editingHabitId);
    if (habit) { habit.name = name; habit.emoji = selectedEmoji; habit.frequency = [...selectedFreq]; habit.type = selectedType; habit.target = target; habit.unit = unit; habit.duration = duration; habit.timeOfDay = selectedTimeOfDay; }
  } else {
    state.habits.push({ id: uid(), name, emoji: selectedEmoji, frequency: [...selectedFreq], type: selectedType, target, unit, duration, timeOfDay: selectedTimeOfDay, archived: false, createdAt: getLocalDateStr(new Date()), completions: {}, notes: {} });
  }
  saveState(); render(); closeHabitModal();
}

function deleteHabitFromModal() {
  const habit = state.habits.find(h => h.id === editingHabitId); if (!habit) return;
  closeHabitModal();
  deleteHabitDirect(habit.id);
}

function deleteHabitDirect(habitId) {
  const idx = state.habits.findIndex(h => h.id === habitId); if (idx === -1) return;
  
  animateRemoval(habitId, () => {
    const [removedHabit] = state.habits.splice(idx, 1);
    saveState(); render();
    if (navigator.vibrate) navigator.vibrate([12, 30, 12]);
    showToast(`"${removedHabit.name}" eliminado`, 4500, 'Deshacer', () => {
      const restoreIdx = Math.min(idx, state.habits.length);
      state.habits.splice(restoreIdx, 0, removedHabit);
      saveState(); render();
      showToast('Hábito restaurado');
    });
  });
}

function toggleArchiveHabitFromModal() {
  const habit = state.habits.find(h => h.id === editingHabitId); if (!habit) return;
  const action = habit.archived ? 'desarchivar' : 'archivar';
  showConfirm(`¿Quieres ${action} el hábito "${habit.name}"?`, () => {
      animateRemoval(habit.id, () => {
        habit.archived = !habit.archived;
        saveState(); render(); closeHabitModal();
      });
  }, { title: habit.archived ? 'Desarchivar' : 'Archivar', okLabel: 'Aceptar', danger: false });
}

// ==== MODAL: DETALLE ====
function openDetailModal(habitId) { detailHabitId = habitId; detailCalendarDate = new Date(); selectedNoteDate = null; document.getElementById('note-section').classList.remove('active'); document.getElementById('detail-modal').classList.add('active'); renderDetailModal(); }
function closeDetailModal() { document.getElementById('detail-modal').classList.remove('active'); detailHabitId = null; }
function changeDetailMonth(dir) { detailCalendarDate.setMonth(detailCalendarDate.getMonth() + dir); renderDetailModal(); }

function selectNoteDate(dateStr) {
  selectedNoteDate = dateStr; const habit = state.habits.find(h => h.id === detailHabitId);
  document.getElementById('note-date-label').textContent = new Date(dateStr + 'T00:00:00').toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
  document.getElementById('habit-note-input').value = (habit.notes && habit.notes[dateStr]) ? habit.notes[dateStr] : '';
  updateStatusButtons(isHabitDone(habit, habit.completions[dateStr]) ? 'done' : habit.completions[dateStr]);
  document.getElementById('note-section').classList.add('active'); renderDetailModal(); 
}

function updateStatusButtons(status) {
  document.getElementById('status-none').className = 'status-btn none' + (!status || (typeof status==='number' && status>0) ? ' active' : '');
  document.getElementById('status-skip').className = 'status-btn skip' + (status === 'skip' ? ' active' : '');
  document.getElementById('status-done').className = 'status-btn done' + (status === 'done' ? ' active' : '');
}

function setDayStatus(newStatus) {
  if (!detailHabitId || !selectedNoteDate) return;
  const habit = state.habits.find(h => h.id === detailHabitId); const currentVal = habit.completions[selectedNoteDate];
  if (newStatus === 'done' && isHabitDone(habit, currentVal)) return; 
  if (newStatus === currentVal) return;

  const dow = new Date(selectedNoteDate + 'T00:00:00').getDay(); const isTryingToCompleteRestDay = newStatus === 'done' && !habit.frequency.includes(dow);

  const executeChange = () => { if (!newStatus) delete habit.completions[selectedNoteDate]; else habit.completions[selectedNoteDate] = newStatus; updateStatusButtons(newStatus); saveState(); renderDetailModal(); render(); };
  if (isTryingToCompleteRestDay) { showConfirm('¿Estás seguro de marcar como completado un día de descanso?', executeChange, {title: 'Día Libre', okLabel: 'Completar', danger: false}); } else { executeChange(); }
}

function saveNote() {
  if (!detailHabitId || !selectedNoteDate) return;
  const habit = state.habits.find(h => h.id === detailHabitId); const text = document.getElementById('habit-note-input').value.trim();
  if (!habit.notes) habit.notes = {};
  if (text === '') delete habit.notes[selectedNoteDate]; else habit.notes[selectedNoteDate] = text;
  saveState(); renderDetailModal(); showToast("Nota guardada");
}

function renderDetailModal() {
  const habit = state.habits.find(h => h.id === detailHabitId); if (!habit) return;
  document.getElementById('detail-title').textContent = `${habit.emoji} ${habit.name}`;
  document.getElementById('detail-current').textContent = getStreak(habit);
  document.getElementById('detail-best').textContent = getBestStreak(habit);
  document.getElementById('detail-rate').textContent = getCompletionRate(habit) + '%';
  const year = detailCalendarDate.getFullYear(); const month = detailCalendarDate.getMonth();
  const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('detail-cal-title').textContent = `${monthNames[month]} ${year}`;
  const firstDay = new Date(year, month, 1); const lastDay = new Date(year, month + 1, 0);
  const startDow = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
  const todayStr = getLocalDateStr(new Date());

  const cal = document.getElementById('detail-calendar');
  cal.innerHTML = ['L','M','X','J','V','S','D'].map(d => `<div class="cal-day-label">${d}</div>`).join('');
  for (let i = 0; i < startDow; i++) cal.innerHTML += `<div></div>`;
  
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const ds = getLocalDateStr(new Date(year, month, d)); const val = habit.completions[ds];
    const isToday = ds === todayStr; const isFuture = ds > todayStr;
    const isRequired = habit.frequency.includes(new Date(ds + 'T00:00:00').getDay());
    const hasNote = habit.notes && habit.notes[ds] && habit.notes[ds].trim() !== ''; const isSelected = ds === selectedNoteDate;

    let classes = 'cal-day';
    if (isHabitDone(habit, val)) classes += ' done'; else if (val === 'skip') classes += ' skip'; else if (!isRequired && !isFuture) classes += ' rest';
    if (isToday) classes += ' today'; if (hasNote) classes += ' has-note'; if (isSelected) classes += ' selected';

    let badge = '';
    if (val === 'skip') { badge = `<span style="position:absolute; top:2px; right:4px; font-size:9px;">⏸</span>`; } 
    else if (!isRequired && !isFuture && !isHabitDone(habit, val)) { badge = `<span style="position:absolute; top:2px; right:4px; font-size:9px; color:var(--text-muted); font-weight:bold;">zz</span>`; }

    const dayDiv = document.createElement('div'); dayDiv.className = classes; dayDiv.innerHTML = `${d}${badge}`;
    if (!isFuture) dayDiv.onclick = () => selectNoteDate(ds); else { dayDiv.style.opacity = '0.3'; dayDiv.style.cursor = 'default'; }
    cal.appendChild(dayDiv);
  }
}
document.addEventListener('touchstart', (e) => {
  if (openSwipeWrap && !openSwipeWrap.contains(e.target)) closeOpenSwipe();
}, { passive: true });
document.addEventListener('click', (e) => {
  if (openSwipeWrap && !openSwipeWrap.contains(e.target)) closeOpenSwipe();
});
initTheme(); loadState();
</script>
</body>
